# Runtime-mounted only via docker-compose.prod.yml — deliberately not baked
# into the nginx-prod image (which stays plain-HTTP so local prod-shaped
# testing keeps working without cert material). Cert/key come from a
# Cloudflare Origin Certificate (15-year validity, no renewal automation
# needed), living only on the box's disk at ./deploy/tls — never in git,
# never in an image layer.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;
    root /var/www/html/public;
    index index.php;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # nginx terminates TLS before proxying to PHP-FPM, so without this
        # Laravel's isSecure()/url()/asset() would think the request was
        # plain HTTP and generate http:// links behind real HTTPS.
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
