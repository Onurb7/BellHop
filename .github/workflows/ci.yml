name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Pint, Larastan, Pest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bellhop_testing
          POSTGRES_USER: bellhop
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bellhop -d bellhop_testing"
          --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=10

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: bellhop_testing
      DB_USERNAME: bellhop
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      # Real Stripe test-mode secret key — the test suite deliberately hits
      # Stripe's real sandbox (customer/payment-method/refund/off-session
      # charge creation), it isn't mocked. Same key as your local .env's
      # STRIPE_SECRET, added as a repo secret in GitHub Settings > Secrets
      # and variables > Actions.
      STRIPE_SECRET: ${{ secrets.STRIPE_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, mbstring, zip, exif, pcntl, bcmath, gd, intl, opcache, redis
          coverage: none

      - uses: ramsey/composer-install@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Feature tests that assert on a full Inertia page render (not just a
      # JSON/XHR response) go through resources/views/app.blade.php, whose
      # @vite directive needs a real public/build/manifest.json to resolve
      # asset URLs — it errors out otherwise, even though the tests never
      # execute any JS. Locally this is a non-issue since a manifest already
      # sits on disk (gitignored, built once and left there); CI starts from
      # a clean checkout every time.
      - run: npm run build

      - run: cp .env.example .env
      - run: php artisan key:generate --ansi

      - name: Pint (style check)
        run: vendor/bin/pint --test

      - name: Larastan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Pest
        run: composer test

  frontend:
    name: Frontend (build, Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run test:js

  docker-build-push:
    name: Build & push images to GHCR
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/onurb7/bellhop-app:latest
            ghcr.io/onurb7/bellhop-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: nginx-prod
          push: true
          tags: |
            ghcr.io/onurb7/bellhop-nginx:latest
            ghcr.io/onurb7/bellhop-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
