name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Pint, Larastan, Pest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bellhop_testing
          POSTGRES_USER: bellhop
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bellhop -d bellhop_testing"
          --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=10

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: bellhop_testing
      DB_USERNAME: bellhop
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, mbstring, zip, exif, pcntl, bcmath, gd, intl, opcache, redis
          coverage: none

      - uses: ramsey/composer-install@v3

      - run: cp .env.example .env
      - run: php artisan key:generate --ansi

      - name: Pint (style check)
        run: vendor/bin/pint --test

      - name: Larastan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Pest
        run: composer test

  frontend:
    name: Frontend (build, Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run test:js
