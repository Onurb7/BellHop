# Production overlay — swaps locally-built images for pre-built GHCR images
# and drops the dev-only mailpit service. A real deploy runs:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
#
# docker-compose.yml on its own is still fully buildable, for local
# prod-shaped testing (`docker compose -f docker-compose.yml up -d --build`).

services:
  app:
    build: !reset null
    image: ghcr.io/onurb7/bellhop-app:${IMAGE_TAG:-latest}

  # worker/scheduler never had their own build: block in docker-compose.yml
  # (they inherit image: bellhop-app via the x-app anchor) — only image:
  # needs overriding here.
  worker:
    image: ghcr.io/onurb7/bellhop-app:${IMAGE_TAG:-latest}

  scheduler:
    image: ghcr.io/onurb7/bellhop-app:${IMAGE_TAG:-latest}

  nginx:
    build: !reset null
    image: ghcr.io/onurb7/bellhop-nginx:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - storage_app:/var/www/html/storage/app
      - ./docker/nginx/prod.tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/tls:/etc/nginx/tls:ro

  mailpit: !reset null
